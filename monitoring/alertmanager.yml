# Alertmanager configuration stub for BareMetalWeb.
# Replace receiver configs with your actual Slack/PagerDuty/email endpoints.

global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 15m

    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 1h

receivers:
  - name: "default"
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

  - name: "critical"
    # pagerduty_configs:
    #   - service_key: "YOUR_PAGERDUTY_KEY"
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/YOUR/CRITICAL/WEBHOOK"

  - name: "warning"
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/YOUR/WARNING/WEBHOOK"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
