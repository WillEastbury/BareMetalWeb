name: Download Static Assets

run-name: "Download Static Assets - ${{ github.event.inputs.force_refresh == 'true' && 'force refresh' || 'update missing' }}"

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-download all assets (delete existing files first)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  download-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Clear existing assets (force refresh)
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: |
          echo "Force refresh: removing existing theme bundles, fonts, and bootstrap JS..."
          rm -f BareMetalWeb.Core/wwwroot/static/css/themes/*.min.css
          rm -f BareMetalWeb.Core/wwwroot/static/fonts/bootstrap-icons.woff2
          rm -f BareMetalWeb.Core/wwwroot/static/fonts/*.woff2
          rm -f BareMetalWeb.Core/wwwroot/static/js/bootstrap.bundle.min.js
          echo "Cleared."

      - name: Download static assets
        run: node tools/download-assets.js

      - name: Check for changes
        id: changes
        run: |
          git add \
            "BareMetalWeb.Core/wwwroot/static/css/themes/" \
            "BareMetalWeb.Core/wwwroot/static/fonts/" \
            "BareMetalWeb.Core/wwwroot/static/js/bootstrap.bundle.min.js"
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Commit and push assets
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update bundled static assets (bootstrap, bootswatch themes, fonts)"
          git push
