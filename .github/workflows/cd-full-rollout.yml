# ────────────────────────────────────────────────────────────────────────────────
# CD3 — Full Production Rollout
#
# Manually triggered after CD2 early-adopter deployment is validated.
# Gated by the "production-rollout" GitHub Environment (requires manual approval).
# Deploys to all remaining production-ring tenants from deploy-list.json.
# ────────────────────────────────────────────────────────────────────────────────
name: "5 · CD3 — Full Rollout"

run-name: "5 · CD3 — Full Rollout — ${{ inputs.image_tag }}"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. 1.20260309.42-linux-arm64)'
        required: true
        type: string

concurrency:
  group: cd3-full-rollout
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  ACR_NAME: metalclusterregistry
  ACR_IMAGE: baremetalweb

jobs:
  # ── Verify image exists ─────────────────────────────────────────────────
  verify:
    name: Verify image tag
    runs-on: ubuntu-latest
    environment: production-rollout
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check tag exists in ACR
        run: |
          az acr repository show-tags \
            --name ${{ env.ACR_NAME }} \
            --repository ${{ env.ACR_IMAGE }} \
            --query "[?@=='${{ inputs.image_tag }}']" \
            -o tsv | grep -q '${{ inputs.image_tag }}' \
            || { echo "::error::Tag '${{ inputs.image_tag }}' not found in ACR"; exit 1; }
          echo "✓ Image tag verified: ${{ inputs.image_tag }}"

  # ── Build JIT deploy package ─────────────────────────────────────────────
  build-deploy-package:
    name: Build JIT deploy package
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: JIT publish (AnyCPU)
        run: |
          dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj \
            --configuration Release \
            --output ./publish \
            -p:InformationalVersion=${{ inputs.image_tag }}

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: ./publish
          retention-days: 3

  # ── Build production deploy matrix ──────────────────────────────────────
  prepare-matrix:
    name: Prepare production matrix
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from deploy-list.json
        id: matrix
        run: |
          COUNT=$(jq '[.targets[] | select(.ring == "production")] | length' deploy-list.json)
          echo "Production tenants to deploy: $COUNT"
          MATRIX=$(jq -c '{ include: [.targets[] | select(.ring == "production")] }' deploy-list.json)
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

  # ── Deploy to production tenants ────────────────────────────────────────
  deploy-production:
    name: "Deploy · ${{ matrix.name }}"
    needs: [prepare-matrix, build-deploy-package]
    if: needs.prepare-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/deploy-tenant.yml
    with:
      app-name: ${{ matrix.app_name }}
      resource-group: ${{ matrix.resource_group }}
      artifact-name: deploy-package
      health-check-url: ${{ matrix.url }}
    secrets:
      azure-credentials: ${{ secrets.AZURE_CREDENTIALS_TENANTS }}

  # ── Deploy to AKS (production) ─────────────────────────────────────────
  deploy-aks:
    name: Deploy to AKS (production)
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name metalcluster \
            --resource-group Personal \
            --overwrite-existing

      - name: Apply manifests
        run: kubectl apply -f kubectl/

      - name: Deploy image
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${{ inputs.image_tag }}"
          kubectl set image statefulset/baremetalweb \
            baremetalweb="${IMAGE}" \
            --namespace baremetalweb
          echo "### 🚀 AKS Deploying: \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/baremetalweb \
            --namespace baremetalweb \
            --timeout=300s

      - name: Health check
        run: |
          for i in $(seq 1 6); do
            POD=$(kubectl get pod -n baremetalweb \
              -l app.kubernetes.io/name=baremetalweb \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [[ -z "${POD}" ]]; then
              echo "Attempt ${i}/6 — no pod found, waiting 10s..."
              sleep 10
              continue
            fi
            READY=$(kubectl get pod -n baremetalweb "${POD}" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [[ "${READY}" == "True" ]]; then
              echo "✓ Pod ${POD} is Running and Ready"
              echo "### ✅ AKS Deployed: \`${POD}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt ${i}/6 — waiting 10s..."
            sleep 10
          done
          echo "::error::AKS health check failed after 6 attempts"
          exit 1

  # ── Summary ─────────────────────────────────────────────────────────────
  summary:
    name: CD3 Summary
    needs: [deploy-production, deploy-aks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "### 🎉 CD3 Full Production Rollout" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Production Tenants | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AKS Cluster | ${{ needs.deploy-aks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.deploy-production.result }}" == "success" && \
                "${{ needs.deploy-aks.result }}" == "success" ]]; then
            echo "### ✅ Full rollout complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some deployments may have failed — review above" >> $GITHUB_STEP_SUMMARY
          fi
