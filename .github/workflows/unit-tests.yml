name: Unit Tests

run-name: "Unit Tests - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Stage 1a: Build Debug (for tests) ──────────────────────────────────
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore BareMetalWeb.sln

      - name: Build solution (Debug)
        run: dotnet build BareMetalWeb.sln --configuration Debug --no-restore

      - name: Upload Debug build
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: |
            **/bin/Debug/
            **/obj/Debug/
          retention-days: 1

  # ── Stage 1b: Publish Release AOT+trimmed (validation gate) ────────────
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Publish Host (Release, AOT+trimmed)
        run: |
          dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj \
            --configuration Release \
            --output ./publish \
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} \
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} \
            -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Upload Release publish output
        uses: actions/upload-artifact@v4
        with:
          name: publish-release
          path: ./publish
          retention-days: 1

  # ── Stage 2: Test shards (parallel, test Debug build) ──────────────────
  test-data:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Data tests
        run: dotnet test BareMetalWeb.Data.Tests/BareMetalWeb.Data.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration"

  test-host:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Host tests
        run: dotnet test BareMetalWeb.Host.Tests/BareMetalWeb.Host.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration"

  test-rendering:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Rendering + Runtime + API + Core tests
        run: |
          dotnet test BareMetalWeb.Rendering.Tests/BareMetalWeb.Rendering.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration"
          dotnet test BareMetalWeb.Runtime.Tests/BareMetalWeb.Runtime.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration"
          dotnet test BareMetalWeb.Core.Tests/BareMetalWeb.Core.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s 2>/dev/null || true
          dotnet test BareMetalWeb.API.Tests/BareMetalWeb.API.Tests.csproj --configuration Debug --no-build --verbosity minimal --blame-hang-timeout 60s 2>/dev/null || true

  # ── Stage 2b: Jest tests (no .NET build dependency) ────────────────────
  test-jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: tests/js-unit/node_modules
          key: npm-jest-${{ hashFiles('tests/js-unit/package-lock.json') }}
          restore-keys: npm-jest-
      - name: Install Jest dependencies
        working-directory: tests/js-unit
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run Jest unit tests
        working-directory: tests/js-unit
        run: npm test
