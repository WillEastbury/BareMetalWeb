name: Unit Tests

run-name: "Unit Tests - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Stage 1a: Build Debug (for tests) ──────────────────────────────────
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore BareMetalWeb.sln

      - name: Build solution (Debug)
        run: dotnet build BareMetalWeb.sln --configuration Debug --no-restore

      - name: Upload Debug build
        uses: actions/upload-artifact@v7
        with:
          name: build-debug
          path: |
            **/bin/Debug/
            **/obj/Debug/
          retention-days: 1

  # ── Stage 2: Test shards (all parallel, each on a separate runner) ──────
  # Each shard: download the pre-built Debug artifact, run --no-build.
  # All shards are independent – they fan out from build-debug and
  # converge at the tests-passed summary job so callers have a single gate.

  test-data:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Data tests
        run: |
          dotnet test BareMetalWeb.Data.Tests/BareMetalWeb.Data.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration" \
            --results-directory TestResults --logger "trx"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-data
          path: TestResults/
          retention-days: 7

  test-host:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Host tests
        run: |
          dotnet test BareMetalWeb.Host.Tests/BareMetalWeb.Host.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration" \
            --results-directory TestResults --logger "trx"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-host
          path: TestResults/
          retention-days: 7

  test-rendering:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Rendering tests
        run: |
          dotnet test BareMetalWeb.Rendering.Tests/BareMetalWeb.Rendering.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration" \
            --results-directory TestResults --logger "trx"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-rendering
          path: TestResults/
          retention-days: 7

  test-runtime:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Runtime tests
        run: |
          dotnet test BareMetalWeb.Runtime.Tests/BareMetalWeb.Runtime.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --filter "FullyQualifiedName!~PerformanceTests&Category!=Integration" \
            --results-directory TestResults --logger "trx"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-runtime
          path: TestResults/
          retention-days: 7

  test-core:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run Core tests
        run: |
          dotnet test BareMetalWeb.Core.Tests/BareMetalWeb.Core.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --results-directory TestResults --logger "trx" 2>/dev/null || true
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-core
          path: TestResults/
          retention-days: 7

  test-api:
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
          path: .
      - name: Run API tests
        run: |
          dotnet test BareMetalWeb.API.Tests/BareMetalWeb.API.Tests.csproj \
            --configuration Debug --no-build --verbosity minimal \
            --blame-hang-timeout 60s \
            --results-directory TestResults --logger "trx" 2>/dev/null || true
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-api
          path: TestResults/
          retention-days: 7

  # ── Stage 2b: Jest tests (no .NET build dependency) ────────────────────
  test-jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: tests/js-unit/node_modules
          key: npm-jest-${{ hashFiles('tests/js-unit/package-lock.json') }}
          restore-keys: npm-jest-
      - name: Install Jest dependencies
        working-directory: tests/js-unit
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run Jest unit tests
        working-directory: tests/js-unit
        run: npm test

  # ── Stage 3: Summary gate – all shards must pass ───────────────────────
  # External jobs (e.g. ci-cd-pipeline.yml) can depend on this single job
  # instead of enumerating every shard.
  tests-passed:
    needs: [test-data, test-host, test-rendering, test-runtime, test-core, test-api, test-jest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all shards passed
        run: |
          results=(
            "${{ needs.test-data.result }}"
            "${{ needs.test-host.result }}"
            "${{ needs.test-rendering.result }}"
            "${{ needs.test-runtime.result }}"
            "${{ needs.test-core.result }}"
            "${{ needs.test-api.result }}"
            "${{ needs.test-jest.result }}"
          )
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "::error::One or more test shards failed (results: ${results[*]})"
              exit 1
            fi
          done
          echo "All test shards passed ✓"
