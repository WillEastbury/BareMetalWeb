# ────────────────────────────────────────────────────────────────────────────────
# deploy-aks.yml — Deploy a pre-built image to AKS by flipping the version tag
#
# This workflow does NOT build. It deploys an image already pushed by container.yml.
# The image tag encodes version + platform: e.g. 1.20260308.42-linux-arm64
#
# Usage: run manually, pick the version tag to deploy.
# ────────────────────────────────────────────────────────────────────────────────
name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Full image tag to deploy (e.g. 1.20260308.42-linux-arm64)'
        required: true
        type: string

concurrency:
  group: deploy-aks
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  AKS_CLUSTER: metalcluster
  AKS_RESOURCE_GROUP: Personal
  IMAGE_NAME: baremetalweb
  NAMESPACE: baremetalweb

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    environment: aks-production

    steps:
      - uses: actions/checkout@v4

      # ── Azure Login (OIDC) ─────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Configure kubectl ──────────────────────────────────────────────
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name ${{ env.AKS_CLUSTER }} \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --overwrite-existing

      # ── Verify image exists in ACR ─────────────────────────────────────
      - name: Verify image tag exists
        run: |
          az acr repository show-tags \
            --name metalclusterregistry \
            --repository ${{ env.IMAGE_NAME }} \
            --query "[?@=='${{ inputs.image_tag }}']" \
            -o tsv | grep -q '${{ inputs.image_tag }}' \
            || { echo "::error::Tag '${{ inputs.image_tag }}' not found in ACR"; exit 1; }

      # ── Apply manifests ────────────────────────────────────────────────
      - name: Apply Kubernetes manifests
        run: kubectl apply -f kubectl/

      # ── Rolling deployment ─────────────────────────────────────────────
      - name: Set image and roll out
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          kubectl set image statefulset/baremetalweb \
            baremetalweb="${IMAGE}" \
            --namespace ${{ env.NAMESPACE }}
          echo "### 🐳 Deploying: \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/baremetalweb \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=300s

      # ── Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          for i in $(seq 1 6); do
            POD=$(kubectl get pod -n ${{ env.NAMESPACE }} \
              -l app.kubernetes.io/name=baremetalweb \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

            if [[ -z "${POD}" ]]; then
              echo "Attempt ${i}/6 — no pod found, waiting 10s..."
              sleep 10
              continue
            fi

            PHASE=$(kubectl get pod -n ${{ env.NAMESPACE }} "${POD}" \
              -o jsonpath='{.status.phase}' 2>/dev/null || true)

            if [[ "${PHASE}" == "Running" ]]; then
              READY=$(kubectl get pod -n ${{ env.NAMESPACE }} "${POD}" \
                -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
              if [[ "${READY}" == "True" ]]; then
                echo "✓ Pod ${POD} is Running and Ready"
                echo "### ✅ Healthy: \`${POD}\`" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi

            echo "Attempt ${i}/6 — pod ${POD} phase=${PHASE}, waiting 10s..."
            sleep 10
          done

          echo "### ⚠️ Health check inconclusive" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          exit 1

      # ── Summary ────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo ""
          echo "=== Deployment Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide || true
          echo ""
          kubectl get svc -n ${{ env.NAMESPACE }} || true
