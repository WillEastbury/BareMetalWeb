name: Reset Data Store (Staging)

run-name: "Reset Data Store (Staging) - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: reset-data-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  reset-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj --configuration Release --output ./publish -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Include reset-data flag
        run: touch ./publish/reset-data.flag

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Stop app and clear package-run mode
        run: |
          az webapp stop --name baremetalweb --resource-group baremetalweb-rg
          az webapp config appsettings set --name baremetalweb --resource-group baremetalweb-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 --output none
          echo "✓ App stopped, WEBSITE_RUN_FROM_PACKAGE=0"

      - name: Deploy to Azure Web App
        run: |
          cd ./publish && zip -qr ../deploy.zip . && az webapp deploy --name baremetalweb --resource-group baremetalweb-rg --src-path ../deploy.zip --type zip --clean true

      - name: Start app
        run: az webapp start --name baremetalweb --resource-group baremetalweb-rg
