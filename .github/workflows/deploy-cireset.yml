name: Deploy and Test CI Reset Site

run-name: "Deploy CI Reset Site - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  # Disabled automatic push trigger - can still be triggered manually via workflow_dispatch
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cireset
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj --configuration Release --output ./publish -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Include reset-data flag
        run: touch ./publish/reset-data.flag

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CIRESET }}

      - name: Ensure app runs from deployed files
        run: |
          az webapp config appsettings set --name baremetalweb-cireset --resource-group baremetalweb-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 --output none

      - name: Deploy to Azure Web App (CI Reset)
        run: |
          cd ./publish && zip -qr ../deploy.zip . && az webapp deploy --name baremetalweb-cireset --resource-group baremetalweb-rg --src-path ../deploy.zip --type zip --clean true

      - name: Restart app
        run: |
          az webapp restart --name baremetalweb-cireset --resource-group baremetalweb-rg
          echo "Waiting 30 seconds for app to restart..."
          sleep 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: tests/playwright
        env:
          BASE_URL: https://baremetalweb-cireset.azurewebsites.net
          CIMIGRATE_TEST_USERNAME: ${{ secrets.CIMIGRATE_TEST_USERNAME }}
          CIMIGRATE_TEST_DISPLAYNAME: ${{ secrets.CIMIGRATE_TEST_DISPLAYNAME }}
          CIMIGRATE_TEST_PASSWORD: ${{ secrets.CIMIGRATE_TEST_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/playwright/test-results.json
          retention-days: 30
