name: Deploy to Production

run-name: "Deploy to Production - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"
# Full informational version format: V{Major}.{YYYYMMDD}.{build} (set as InformationalVersion on assemblies)
# Assembly/file version format: {Major}.0.0.{build} (required to be valid .NET version: each part ≤ 65535)

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~PerformanceTests&Category!=Integration"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Jest dependencies
        working-directory: tests/js-unit
        run: npm ci

      - name: Run Jest unit tests
        working-directory: tests/js-unit
        run: npm test

      - name: Publish
        run: dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj --configuration Release --output ./publish -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Stop app and configure for AOT binary
        run: |
          az webapp stop --name baremetalweb-prod --resource-group baremetalweb-rg
          az webapp config appsettings set --name baremetalweb-prod --resource-group baremetalweb-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 --output none
          az webapp config set --name baremetalweb-prod --resource-group baremetalweb-rg \
            --startup-file "./BareMetalWeb.Host" --output none
          echo "✓ App stopped, WEBSITE_RUN_FROM_PACKAGE=0, startup-file set"

      - name: Deploy to Azure Web App
        run: |
          cd ./publish && zip -qr ../deploy.zip . && az webapp deploy --name baremetalweb-prod --resource-group baremetalweb-rg --src-path ../deploy.zip --type zip --clean true

      - name: Start app
        run: az webapp start --name baremetalweb-prod --resource-group baremetalweb-rg
