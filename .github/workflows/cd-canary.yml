# ────────────────────────────────────────────────────────────────────────────────
# CD — Canary Deployment (AKS)
#
# Triggered automatically when CI2 (AOT Builds & Container) passes on main.
# Updates the baremetalweb statefulset image tag on AKS to the freshly pushed
# container image, then waits for the rollout and health-checks the pod.
# ────────────────────────────────────────────────────────────────────────────────
name: "3 · CD Canary"

run-name: "3 · CD Canary — V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  workflow_run:
    workflows: ["2 · CI2 — AOT Builds & Agent Container"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  ACR_IMAGE: baremetalweb
  AKS_CLUSTER: metalcluster
  AKS_RG: Personal
  NAMESPACE: baremetalweb

jobs:
  # ── Gate: skip if CI2 failed ────────────────────────────────────────────
  gate:
    name: Check CI2 result
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI2 passed — proceeding with canary deployment"

  # ── Deploy to AKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy canary
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Compute image tag
        id: tag
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          # CI2 run number is passed via the triggering workflow_run event;
          # for workflow_dispatch fall back to this run's number.
          BUILD="${{ github.event.workflow_run.run_number || github.run_number }}"
          TAG="${MAJOR}.${DATE}.${BUILD}"
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${TAG}-linux-arm64"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Deploying image: ${IMAGE}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name "${{ env.AKS_CLUSTER }}" \
            --resource-group "${{ env.AKS_RG }}" \
            --overwrite-existing \
            --output none

      - name: Update statefulset image
        run: |
          kubectl set image statefulset/baremetalweb \
            baremetalweb="${{ steps.tag.outputs.image }}" \
            --namespace "${{ env.NAMESPACE }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/baremetalweb \
            --namespace "${{ env.NAMESPACE }}" \
            --timeout=300s

      - name: Health check
        run: |
          POD=$(kubectl get pod -n "${{ env.NAMESPACE }}" \
            -l app.kubernetes.io/name=baremetalweb \
            -o jsonpath='{.items[0].metadata.name}')
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(kubectl exec -n "${{ env.NAMESPACE }}" "${POD}" -- \
              wget -q -O- --timeout=5 http://localhost:5232/health 2>/dev/null || true)
            if [[ -n "${STATUS}" ]]; then
              echo "✅ Health check passed (attempt ${attempt})"
              exit 0
            fi
            echo "Attempt ${attempt}/6 — waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 6 attempts"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### 🐤 Canary Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.tag.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | ${{ env.AKS_CLUSTER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | ${{ env.NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n "${{ env.NAMESPACE }}" -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
