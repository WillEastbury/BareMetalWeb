# ────────────────────────────────────────────────────────────────────────────────
# CD2 — Early Adopter Rollout
#
# Manually triggered after CD1 extended tests pass.
# 1. Generates release notes from merged PRs since the last tag
# 2. Creates a GitHub Release with AOT binaries attached
# 3. Deploys to all early-access tenants from deploy-list.json in parallel
# 4. Halts — CD3 must be triggered manually after validation.
#
# Downstream: CD3 (cd-full-rollout.yml) is triggered manually after review.
# ────────────────────────────────────────────────────────────────────────────────
name: "4 · CD2 — Early Adopters"

run-name: "4 · CD2 — Early Adopters — ${{ inputs.image_tag }}"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. 1.20260309.42-linux-arm64)'
        required: true
        type: string

concurrency:
  group: cd2-early-adopters
  cancel-in-progress: false

permissions:
  contents: write
  packages: read
  id-token: write

env:
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  ACR_NAME: metalclusterregistry
  ACR_IMAGE: baremetalweb

jobs:
  # ── Verify image exists ─────────────────────────────────────────────────
  verify:
    name: Verify image tag
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check tag exists in ACR
        run: |
          az acr repository show-tags \
            --name ${{ env.ACR_NAME }} \
            --repository ${{ env.ACR_IMAGE }} \
            --query "[?@=='${{ inputs.image_tag }}']" \
            -o tsv | grep -q '${{ inputs.image_tag }}' \
            || { echo "::error::Tag '${{ inputs.image_tag }}' not found in ACR"; exit 1; }
          echo "✓ Image tag verified: ${{ inputs.image_tag }}"

  # ── Release Notes + GitHub Release ──────────────────────────────────────
  release:
    name: Build release notes
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.tag.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          VERSION_TAG="${TAG%-linux-*}"
          VERSION_TAG="${VERSION_TAG%-windows-*}"
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Collect merged PR titles since last release
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          NOTES_FILE=$(mktemp)
          FEATURE_FILE=$(mktemp)
          FIX_FILE=$(mktemp)
          OTHER_FILE=$(mktemp)

          COMMITS=$(git log "${PREV_TAG}..HEAD" --merges --pretty=format:"%H" 2>/dev/null || true)
          for SHA in $COMMITS; do
            PR_NUM=$(git log -1 --format="%s" "$SHA" | grep -oP '#\K[0-9]+' | head -1)
            [ -z "$PR_NUM" ] && continue
            TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title' 2>/dev/null || echo "")
            [ -z "$TITLE" ] && continue
            case "$TITLE" in
              fix:*|Fix:*|fix\(*|Fix\(*)
                echo "- $TITLE (#$PR_NUM)" >> "$FIX_FILE" ;;
              feat:*|Feat:*|feat\(*|Feat\(*|Add*|add*)
                echo "- $TITLE (#$PR_NUM)" >> "$FEATURE_FILE" ;;
              *)
                echo "- $TITLE (#$PR_NUM)" >> "$OTHER_FILE" ;;
            esac
          done

          {
            if [ -s "$FEATURE_FILE" ]; then echo "### 🚀 Features"; echo ""; cat "$FEATURE_FILE"; echo ""; fi
            if [ -s "$FIX_FILE"    ]; then echo "### 🐛 Bug Fixes"; echo ""; cat "$FIX_FILE";    echo ""; fi
            if [ -s "$OTHER_FILE"  ]; then echo "### 📦 Other Changes"; echo ""; cat "$OTHER_FILE"; echo ""; fi
          } > "$NOTES_FILE"

          [ ! -s "$NOTES_FILE" ] && echo "No merged PRs found since last release." > "$NOTES_FILE"

          { echo "notes<<NOTES_EOF"; cat "$NOTES_FILE"; echo "NOTES_EOF"; } >> $GITHUB_OUTPUT
          rm -f "$FEATURE_FILE" "$FIX_FILE" "$OTHER_FILE" "$NOTES_FILE"

      - name: Write release notes markdown
        run: |
          mkdir -p docs/releases
          VERSION="${{ steps.tag.outputs.version_tag }}"
          FILENAME="docs/releases/${VERSION}.md"
          cat > "$FILENAME" <<'HEREDOC'
          # Release $VERSION

          **Date:** $(date +%Y-%m-%d)
          **Image Tag:** ${{ inputs.image_tag }}
          **Commit:** ${GITHUB_SHA::8}

          ---

          ${{ steps.prs.outputs.notes }}

          ---

          *Generated automatically by the CI/CD pipeline.*
          HEREDOC
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$FILENAME"
          # Expand variables
          VERSION="${{ steps.tag.outputs.version_tag }}" \
          envsubst < "$FILENAME" > "$FILENAME.tmp" && mv "$FILENAME.tmp" "$FILENAME"
          cat "$FILENAME"

      - name: Commit release notes and create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/releases/
          git commit -m "docs: release notes for ${VERSION}" || echo "Nothing to commit"
          git push
          git tag "v${VERSION}" || true
          git push origin "v${VERSION}" || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version_tag }}"
          NOTES_FILE="docs/releases/${VERSION}.md"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --latest \
            || echo "Release already exists — skipping"

  # ── Build early-access deploy matrix ────────────────────────────────────
  prepare-matrix:
    name: Prepare early-access matrix
    needs: release
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from deploy-list.json
        id: matrix
        run: |
          COUNT=$(jq '[.targets[] | select(.ring == "early-access")] | length' deploy-list.json)
          echo "Early-access tenants to deploy: $COUNT"
          MATRIX=$(jq -c '{ include: [.targets[] | select(.ring == "early-access")] }' deploy-list.json)
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

  # ── Deploy to early-access tenants ──────────────────────────────────────
  deploy-early-access:
    name: "Deploy · ${{ matrix.name }}"
    needs: [prepare-matrix, release]
    if: needs.prepare-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/deploy-tenant.yml
    with:
      app-name: ${{ matrix.app_name }}
      resource-group: ${{ matrix.resource_group }}
      artifact-name: deploy-package
      health-check-url: ${{ matrix.url }}
      version-number: ${{ needs.release.outputs.version_tag }}
    secrets:
      azure-credentials: ${{ secrets.AZURE_CREDENTIALS_TENANTS }}
      control-plane-url: ${{ secrets.CONTROL_PLANE_URL }}
      control-plane-api-key: ${{ secrets.CONTROL_PLANE_API_KEY }}

  # ── Summary ─────────────────────────────────────────────────────────────
  summary:
    name: CD2 Summary
    needs: [release, deploy-early-access]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "### 🚀 CD2 Early Adopter Rollout" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployments:** ${{ needs.deploy-early-access.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** Review early-adopter tenant logs, then manually trigger CD3 (cd-full-rollout.yml) with tag \`${{ inputs.image_tag }}\`." >> $GITHUB_STEP_SUMMARY
