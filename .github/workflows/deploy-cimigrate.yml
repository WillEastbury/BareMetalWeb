name: Deploy to CI Migration Environment

run-name: "Deploy to CI Migration - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: echo "version=V${{ vars.MAJOR_VERSION || '1' }}.$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~IntegrationTests"

      - name: Publish
        run: dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj --configuration Release --output ./publish -p:Version=${{ steps.version.outputs.version }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CIMIGRATE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: baremetalweb-cimigrate
          package: ./publish

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run Integration Tests
        env:
          CIMIGRATE_BASE_URL: https://baremetalweb-cimigrate.azurewebsites.net
          CIMIGRATE_TEST_USERNAME: ${{ secrets.CIMIGRATE_TEST_USERNAME }}
          CIMIGRATE_TEST_PASSWORD: ${{ secrets.CIMIGRATE_TEST_PASSWORD }}
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~IntegrationTests"
