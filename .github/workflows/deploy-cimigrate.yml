name: Deploy to CI Migration Environment

run-name: "Deploy to CI Migration - V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cimigrate
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~IntegrationTests"

      - name: Publish
        run: dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj --configuration Release --output ./publish -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.info_version }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CIMIGRATE }}

      - name: Stop app and configure for AOT binary
        run: |
          az webapp stop --name baremetalweb-cimigrate --resource-group baremetalweb-rg
          az webapp config appsettings set --name baremetalweb-cimigrate --resource-group baremetalweb-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 --output none
          az webapp config set --name baremetalweb-cimigrate --resource-group baremetalweb-rg \
            --startup-file "./BareMetalWeb.Host" --output none
          echo "✓ App stopped, WEBSITE_RUN_FROM_PACKAGE=0, startup-file set"

      - name: Deploy to Azure Web App
        run: |
          cd ./publish && zip -qr ../deploy.zip . && az webapp deploy --name baremetalweb-cimigrate --resource-group baremetalweb-rg --src-path ../deploy.zip --type zip --clean true

      - name: Start app
        run: az webapp start --name baremetalweb-cimigrate --resource-group baremetalweb-rg

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run Integration Tests
        env:
          CIMIGRATE_BASE_URL: https://baremetalweb-cimigrate.azurewebsites.net
          CIMIGRATE_TEST_USERNAME: ${{ secrets.CIMIGRATE_TEST_USERNAME }}
          CIMIGRATE_TEST_PASSWORD: ${{ secrets.CIMIGRATE_TEST_PASSWORD }}
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~IntegrationTests"
