# ────────────────────────────────────────────────────────────────────────────────
# CI2 — Build + Container Build + Push
#
# Triggered automatically when CI1 (Unit Tests) passes on main.
# 1. JIT-publishes an AnyCPU Release package (deploy-package) for Azure Web Apps
# 2. AOT-publishes a native linux-arm64 binary for the container
# 3. Packages the arm64 binary into a thin container (Dockerfile.prebuilt)
# 4. Pushes the linux-arm64 image to ACR
#
# Downstream: CD1 (cd-canary.yml) triggers on this workflow's success.
# ────────────────────────────────────────────────────────────────────────────────
name: "2 · CI2 — AOT & Containers"

run-name: "2 · CI2 — AOT & Containers — V${{ vars.MAJOR_VERSION || '1' }}.${{ github.run_number }}"

on:
  workflow_run:
    workflows: ["1 · CI1 — Tests & JIT Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci2-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: metalclusterregistry
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  ACR_IMAGE: baremetalweb

jobs:
  # ── Gate: skip if CI1 failed ────────────────────────────────────────────
  gate:
    name: Check CI1 result
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI1 passed — proceeding with AOT build + container push"

  # ── Version ─────────────────────────────────────────────────────────────
  version:
    name: Compute version
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      info_version: ${{ steps.version.outputs.info_version }}
      assembly_version: ${{ steps.version.outputs.assembly_version }}
    steps:
      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          SHA="${GITHUB_SHA:0:7}"
          echo "tag=${MAJOR}.${DATE}.${BUILD}" >> $GITHUB_OUTPUT
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${SHA}" >> $GITHUB_OUTPUT
          echo "assembly_version=${MAJOR}.0.0.${BUILD}" >> $GITHUB_OUTPUT

  # ── JIT Publish: AnyCPU (for Azure Web App deployments) ───────────────
  jit-anycpu:
    name: "JIT · AnyCPU"
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: JIT publish (AnyCPU)
        run: |
          dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj \
            --configuration Release \
            --output ./publish \
            -p:AssemblyVersion=${{ needs.version.outputs.assembly_version }} \
            -p:FileVersion=${{ needs.version.outputs.assembly_version }} \
            -p:InformationalVersion=${{ needs.version.outputs.info_version }}

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: ./publish
          retention-days: 3

  # ── AOT Publish: Linux arm64 ───────────────────────────────────────────
  aot-linux-arm64:
    name: "AOT · linux-arm64"
    needs: version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: AOT publish (linux-arm64)
        run: |
          dotnet publish BareMetalWeb.Host/BareMetalWeb.Host.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained \
            --output ./publish \
            -p:AssemblyVersion=${{ needs.version.outputs.assembly_version }} \
            -p:FileVersion=${{ needs.version.outputs.assembly_version }} \
            -p:InformationalVersion=${{ needs.version.outputs.info_version }}

      - name: Upload AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: aot-linux-arm64
          path: ./publish
          retention-days: 3

  # ── Container: Linux arm64 ─────────────────────────────────────────────
  container-linux-arm64:
    name: "Container · linux-arm64"
    needs: [version, aot-linux-arm64]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download AOT artifact
        uses: actions/download-artifact@v4
        with:
          name: aot-linux-arm64
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/arm64
          push: true
          build-args: PUBLISH_DIR=./publish
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-arm64
          labels: |
            org.opencontainers.image.title=BareMetalWeb
            org.opencontainers.image.version=${{ needs.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.workflow_run.created_at }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Summary ────────────────────────────────────────────────────────────
  summary:
    name: Build summary
    needs: [version, jit-anycpu, container-linux-arm64]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if gate was skipped
        if: needs.version.result == 'skipped'
        run: |
          echo "::error::CI1 did not pass — CI2 skipped."
          exit 1

      - name: Summary
        if: needs.version.result != 'skipped'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "### 🏗️ CI2 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| JIT AnyCPU (\`deploy-package\`) | ${{ needs.jit-anycpu.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AOT linux-arm64 | ${{ needs.aot-linux-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Container | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux arm64 | \`${TAG}-linux-arm64\` | ${{ needs.container-linux-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** CD1 (cd-canary.yml) will deploy to canary and run extended tests." >> $GITHUB_STEP_SUMMARY
