name: Build and Push Container Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository }}
  ACR_NAME: metalclusterregistry
  ACR_LOGIN_SERVER: metalclusterregistry.azurecr.io
  ACR_IMAGE: baremetalweb

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      info_version: ${{ steps.version.outputs.info_version }}
    steps:
      - name: Compute version
        id: version
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          DATE="$(date +%Y%m%d)"
          BUILD="${{ github.run_number }}"
          SHA="${GITHUB_SHA:0:7}"
          echo "info_version=${MAJOR}.${DATE}.${BUILD}+${SHA}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${MAJOR}.${DATE}.${BUILD}" >> $GITHUB_OUTPUT
          fi

  # ── Linux amd64 ────────────────────────────────────────────────────────
  build-linux-amd64:
    name: Linux amd64
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-amd64
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-amd64
          build-args: |
            VERSION=${{ needs.version.outputs.info_version }}
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64

  # ── Linux arm64 ────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64
    needs: version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-arm64
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-arm64
          build-args: |
            VERSION=${{ needs.version.outputs.info_version }}
          cache-from: type=gha,scope=linux-arm64
          cache-to: type=gha,mode=max,scope=linux-arm64

  # ── Windows amd64 ──────────────────────────────────────────────────────
  build-windows-amd64:
    name: Windows amd64
    needs: version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.info_version }}"

          for registry in "${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}" "${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}"; do
            docker build \
              -f Dockerfile.windows \
              -t "${registry}:${TAG}-windows-amd64" \
              --build-arg "VERSION=${VERSION}" \
              .
            docker push "${registry}:${TAG}-windows-amd64"
          done

  # ── Deploy to AKS ──────────────────────────────────────────────────────
  deploy-aks:
    name: Deploy to AKS
    needs: [version, build-linux-arm64]
    runs-on: ubuntu-latest
    environment: aks-production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name metalcluster \
            --resource-group Personal \
            --overwrite-existing

      - name: Apply manifests
        run: kubectl apply -f kubectl/

      - name: Deploy image
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE }}:${{ needs.version.outputs.tag }}-linux-arm64"
          kubectl set image statefulset/baremetalweb \
            baremetalweb="${IMAGE}" \
            --namespace baremetalweb
          echo "### 🚀 Deploying: \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/baremetalweb \
            --namespace baremetalweb \
            --timeout=300s

      - name: Health check
        run: |
          sleep 5
          POD=$(kubectl get pod -n baremetalweb \
            -l app.kubernetes.io/name=baremetalweb \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n baremetalweb "${POD}" -- \
            /bin/sh -c 'curl -sf http://localhost:5232/health' 2>/dev/null \
            || kubectl logs -n baremetalweb "${POD}" --tail=20
          echo "### ✅ Deployed successfully" >> "$GITHUB_STEP_SUMMARY"

  # ── Summary ────────────────────────────────────────────────────────────
  summary:
    name: Build summary
    needs: [version, build-linux-amd64, build-linux-arm64, build-windows-amd64, deploy-aks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "### 🐳 Container Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux amd64 | \`${TAG}-linux-amd64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux arm64 | \`${TAG}-linux-arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows amd64 | \`${TAG}-windows-amd64\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To deploy: update \`kubectl/statefulset.yaml\` image tag to the desired version." >> $GITHUB_STEP_SUMMARY
