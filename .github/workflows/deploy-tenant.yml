name: Deploy to Tenant

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: deploy a pre-built publish package to a single Azure Web
# App tenant and run a health-check loop to verify the deployment succeeded.
#
# Inputs
# ──────
#   app-name       – Azure Web App name (e.g. baremetalweb-tenant-acme)
#   artifact-name  – Name of the Actions artifact containing the publish directory
#   version-number – Version number without architecture suffix (e.g. 1.20260309.42)
#                    Used for upgrade verification against the control plane.
#
# Secrets
# ───────
#   azure-credentials      – Service principal JSON for the target Web App
#   control-plane-url      – Base URL of the BMW control plane (optional)
#   control-plane-api-key  – API key for the control plane (optional)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Azure Web App name to deploy to'
        required: true
        type: string
      resource-group:
        description: 'Azure Resource Group containing the Web App'
        required: true
        type: string
      artifact-name:
        description: 'Name of the GitHub Actions artifact containing the publish directory'
        required: true
        type: string
      health-check-url:
        description: 'URL to health-check after deployment'
        required: false
        type: string
        default: ''
      version-number:
        description: 'Version number without architecture suffix (e.g. 1.20260309.42). Used for upgrade verification.'
        required: false
        type: string
        default: ''
    secrets:
      azure-credentials:
        description: 'Azure service principal credentials JSON'
        required: true
      control-plane-url:
        description: 'Base URL of the BMW control plane for upgrade verification. Leave empty to skip.'
        required: false
      control-plane-api-key:
        description: 'API key for the BMW control plane upgrade-status endpoint.'
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: "Deploy to ${{ inputs.app-name }}"
    runs-on: ubuntu-latest

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.azure-credentials }}

      - name: Stop app and configure for AOT binary
        run: |
          az webapp stop --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }}
          az webapp config appsettings set --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 --output none
          az webapp config set --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }} \
            --startup-file "./BareMetalWeb.Host" --output none
          # Stamp ControlPlane.InstanceId so heartbeats are identifiable by app name (#1394)
          az webapp config appsettings set --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }} \
            --settings ControlPlane__InstanceId=${{ inputs.app-name }} --output none
          echo "✓ App stopped, WEBSITE_RUN_FROM_PACKAGE=0, startup-file set, ControlPlane.InstanceId=${{ inputs.app-name }}"

      - name: Deploy to ${{ inputs.app-name }}
        run: |
          cd ./publish && zip -qr ../deploy.zip . && az webapp deploy --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }} --src-path ../deploy.zip --type zip --clean true

      - name: Start app
        run: |
          az webapp start --name ${{ inputs.app-name }} --resource-group ${{ inputs.resource-group }}
          echo "Waiting 30 s for app to start..."
          sleep 30

      - name: Health check
        run: |
          APP_URL="${{ inputs.health-check-url }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://${{ inputs.app-name }}.azurewebsites.net/"
          fi
          echo "Running health check for ${{ inputs.app-name }} at ${APP_URL}"
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${APP_URL}" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Health check passed (HTTP ${STATUS}) ✓"
              exit 0
            fi
            echo "Attempt ${i}/6: HTTP ${STATUS} – retrying in 10 s..."
            sleep 10
          done
          echo "::error::Health check failed for ${{ inputs.app-name }} after 6 attempts – deployment may be broken"
          exit 1

      - name: Verify upgrade version via control plane
        if: ${{ inputs.version-number != '' && secrets.control-plane-url != '' }}
        env:
          CP_URL: ${{ secrets.control-plane-url }}
          CP_API_KEY: ${{ secrets.control-plane-api-key }}
          INSTANCE_ID: ${{ inputs.app-name }}
          TARGET_VERSION: ${{ inputs.version-number }}
        run: |
          echo "Verifying pod upgrade: instanceId=${INSTANCE_ID}, targetVersion=${TARGET_VERSION}"
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s --max-time 10 \
              -H "ApiKey: ${CP_API_KEY}" \
              "${CP_URL}/api/_cluster/upgrade-status?instanceId=${INSTANCE_ID}&targetVersion=${TARGET_VERSION}" \
              2>/dev/null || echo "")

            if [ -z "$RESPONSE" ]; then
              echo "Attempt ${i}/30 — control plane unreachable, waiting 10s..."
              sleep 10
              continue
            fi

            VERIFIED=$(echo "$RESPONSE" | jq -r '.verified // "false"' 2>/dev/null || echo "false")
            CURRENT=$(echo "$RESPONSE" | jq -r '.currentVersion // "unknown"' 2>/dev/null || echo "unknown")
            READY=$(echo "$RESPONSE" | jq -r '.ready // "false"' 2>/dev/null || echo "false")
            ERROR_RATE=$(echo "$RESPONSE" | jq -r '.errorRate5xx // "?"' 2>/dev/null || echo "?")
            REASON=$(echo "$RESPONSE" | jq -r '.reason // "unknown"' 2>/dev/null || echo "unknown")

            if [ "$VERIFIED" = "true" ]; then
              echo "✓ Upgrade verified: instanceId=${INSTANCE_ID}, version=${CURRENT}, ready=${READY}, errorRate5xx=${ERROR_RATE}"
              echo "### ✅ Upgrade verified: \`${INSTANCE_ID}\` on \`${TARGET_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Attempt ${i}/30 — not verified (reason=${REASON}, currentVersion=${CURRENT}, ready=${READY}, errorRate5xx=${ERROR_RATE}), waiting 10s..."
            sleep 10
          done

          echo "::error::Upgrade verification failed for ${INSTANCE_ID} after 30 attempts (5 min). Pod did not report version ${TARGET_VERSION} with healthy status."
          echo "### ❌ Upgrade verification FAILED: \`${INSTANCE_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Expected version: \`${TARGET_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          exit 1
