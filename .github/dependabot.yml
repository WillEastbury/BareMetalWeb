version: 2
updates:
  # NuGet packages across all .csproj files
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - nuget

  # npm packages in the root (bootstrap, esbuild, playwright)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm

  # npm packages for Playwright end-to-end tests
  - package-ecosystem: npm
    directory: /tests/playwright
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - tests

  # npm packages for JS unit tests
  - package-ecosystem: npm
    directory: /tests/js-unit
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - tests

  # GitHub Actions workflow dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
