<div class="input-group">
  <input type="text" class="form-control calculated-field" id="{{id}}" name="{{name}}" value="{{value}}" placeholder="{{placeholder}}" readonly disabled data-calculated="true" data-expression="{{expression}}" data-format="{{format}}">
  <span class="input-group-text" title="Calculated field: {{rawexpression}}">
    <i class="bi bi-calculator-fill"></i>
  </span>
</div>
