<input type="file" class="form-control bm-upload-input" id="{{id}}" name="{{name}}" accept="{{accept}}" {{required}} data-max-size="{{maxFileSizeBytes}}">
<img id="{{id}}_preview" src="{{existingFileUrl}}" class="img-thumbnail mt-2 img-preview-max" alt="preview">
<div class="form-check mt-1">
    <input class="form-check-input" type="checkbox" id="{{id}}_delete" name="{{name}}__delete" value="true">
    <label class="form-check-label" for="{{id}}_delete">Delete existing image</label>
</div>
