  <div class="s" style="padding:var(--g);max-width:600px">
    <div class="b">
      <h3>Create Order</h3>
      <form class="s">
        <label>
          Customer

        </label>
        <label>
          Product
          <input class="i" type="text" placeholder="Product SKU">

        <div class="r">

            Quantity
            <input class="i" type="number" value="1" min="1">
          </label>
          <label class="c">
            Price
            <input class="i" type="number" step="0.01" placeholder="0.00">
          </label>
        </div>
        <label>
          Notes
          <textarea class="i" rows="3" placeholder="Optional notes"></textarea>
        </label>
        <div class="r">
          <button type="submit" class="btn p">Save</button>
          <button type="reset" class="btn">Reset</button>
        </div>
      </form>
