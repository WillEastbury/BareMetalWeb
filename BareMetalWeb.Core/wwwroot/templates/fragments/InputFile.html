<input type="file" class="form-control bm-upload-input" id="{{id}}" name="{{name}}" {{required}} accept="{{accept}}" data-max-size="{{maxFileSizeBytes}}">
<div class="form-text"><a href="{{existingFileUrl}}" target="_blank" rel="noopener">{{existingFileName}}</a></div>
<div class="form-check mt-1">
    <input class="form-check-input" type="checkbox" id="{{id}}_delete" name="{{name}}__delete" value="true">
    <label class="form-check-label" for="{{id}}_delete">Delete existing file</label>
</div>
