apiVersion: apps/v1
kind: Deployment
metadata:
  name: baremetalweb
  namespace: baremetalweb
  labels:
    app.kubernetes.io/name: baremetalweb
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: baremetalweb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: baremetalweb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654       # 'app' user in chiseled images
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: baremetalweb
          image: metalclusterregistry.azurecr.io/baremetalweb:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5232
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: baremetalweb-config
                  key: PORT
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /app/Data
            - name: config
              mountPath: /app/Metal.config
              subPath: Metal.config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: baremetalweb-data
        - name: config
          configMap:
            name: baremetalweb-config
