apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: baremetalweb
  namespace: baremetalweb
  labels:
    app.kubernetes.io/name: baremetalweb
spec:
  serviceName: baremetalweb-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: baremetalweb
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: baremetalweb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654       # 'app' user in chiseled images
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-logs
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - mkdir -p /mnt/data/Logs && chown 1654:1654 /mnt/data/Logs
          volumeMounts:
            - name: data
              mountPath: /mnt/data
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
      containers:
        - name: baremetalweb
          image: metalclusterregistry.azurecr.io/baremetalweb:1.20260314.198-linux-arm64
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5232
              protocol: TCP
            - name: https
              containerPort: 5233
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: baremetalweb-config
                  key: PORT
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /app/Data
            - name: data
              mountPath: /app/Logs
              subPath: Logs
            - name: config
              mountPath: /app/Metal.config
              subPath: Metal.config
              readOnly: true
            - name: tls
              mountPath: /app/tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: baremetalweb-config
        - name: tls
          secret:
            secretName: baremetalweb-tls
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: baremetalweb
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: managed-csi
        resources:
          requests:
            storage: 10Gi
