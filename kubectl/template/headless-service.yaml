apiVersion: v1
kind: Service
metadata:
  name: ${TENANT_NAME}-headless
  namespace: ${TENANT_NAME}
  labels:
    app.kubernetes.io/name: ${TENANT_NAME}
    baremetalweb/tenant: ${TENANT_NAME}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: ${TENANT_NAME}
  ports:
    - name: http
      port: 5232
      targetPort: http
      protocol: TCP
