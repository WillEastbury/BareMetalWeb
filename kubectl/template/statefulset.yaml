apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${TENANT_NAME}
  namespace: ${TENANT_NAME}
  labels:
    app.kubernetes.io/name: ${TENANT_NAME}
    baremetalweb/tenant: ${TENANT_NAME}
spec:
  serviceName: ${TENANT_NAME}-headless
  replicas: ${REPLICAS}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: ${TENANT_NAME}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${TENANT_NAME}
        baremetalweb/tenant: ${TENANT_NAME}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-logs
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - mkdir -p /mnt/data/Logs && chown 1654:1654 /mnt/data/Logs
          volumeMounts:
            - name: data
              mountPath: /mnt/data
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
      containers:
        - name: ${TENANT_NAME}
          image: ${ACR_LOGIN_SERVER}/baremetalweb:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5232
              protocol: TCP
            - name: https
              containerPort: 5233
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ${TENANT_NAME}-config
                  key: PORT
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEM_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEM_LIMIT}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /app/Data
            - name: data
              mountPath: /app/Logs
              subPath: Logs
            - name: config
              mountPath: /app/Metal.config
              subPath: Metal.config
              readOnly: true
            - name: tls
              mountPath: /app/tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: ${TENANT_NAME}-config
        - name: tls
          secret:
            secretName: ${TENANT_NAME}-tls
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: ${TENANT_NAME}
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: managed-csi
        resources:
          requests:
            storage: ${STORAGE}
