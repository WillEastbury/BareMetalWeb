apiVersion: v1
kind: Service
metadata:
  name: ${TENANT_NAME}
  namespace: ${TENANT_NAME}
  labels:
    app.kubernetes.io/name: ${TENANT_NAME}
    baremetalweb/tenant: ${TENANT_NAME}
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-tcp-idle-timeout: "4"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: ${TENANT_NAME}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
