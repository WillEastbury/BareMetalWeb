apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baremetalweb
  namespace: baremetalweb
  labels:
    app.kubernetes.io/name: baremetalweb
  annotations:
    # TLS termination via cert-manager (adjust issuer name to match your cluster)
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - baremetalweb.example.com    # ← replace with your domain
      secretName: baremetalweb-tls
  rules:
    - host: baremetalweb.example.com  # ← replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: baremetalweb
                port:
                  name: http
