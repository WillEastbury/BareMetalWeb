apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: baremetalweb-data
  namespace: baremetalweb
  labels:
    app.kubernetes.io/name: baremetalweb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: default  # ← uncomment and set to your cluster's storage class
