apiVersion: v1
kind: ConfigMap
metadata:
  name: baremetalweb-config
  namespace: baremetalweb
  labels:
    app.kubernetes.io/name: baremetalweb
data:
  # Kestrel port — must match containerPort in deployment.yaml
  PORT: "5232"

  # Metal.config overrides (pipe-delimited key|value)
  Metal.config: |
    Data.Root|/app/Data
    Kestrel.Http2Enabled|true
    Kestrel.Http3Enabled|false
    Kestrel.MaxStreamsPerConnection|100
    Kestrel.InitialConnectionWindowSize|131072
    Kestrel.InitialStreamWindowSize|98304

  # appsettings overrides
  appsettings.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning"
        }
      },
      "AllowedHosts": "*",
      "StaticFiles": {
        "Enabled": true,
        "RequestPathPrefix": "/static",
        "RootDirectory": "wwwroot/static",
        "EnableCaching": true,
        "CacheSeconds": 86400,
        "AddETag": true,
        "AddLastModified": true,
        "AllowUnknownMime": false,
        "DefaultMimeType": "application/octet-stream"
      }
    }
